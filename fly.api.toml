# Deploy API to Fly.io (workaround if Railway proxy keeps 502)
#
# From repo root run:
#   fly deploy ./apps/api --config fly.api.toml
#
# Then set DB and optional custom domain:
#   fly secrets set DATABASE_URL="postgresql://..."  # Railway Postgres *public* URL
#   fly certs add telemetry-api.tacko.io            # optional
#
# Point dashboard API_URL to this app (e.g. https://telemetry-api-fly.fly.dev).

app = 'telemetry-api-fly'
primary_region = 'fra'

[env]
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
