# fly.toml app configuration file generated for dashboard-weathered-resonance-9347 on 2026-03-15T22:06:56+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dashboard-weathered-resonance-9347'
primary_region = 'fra'

[build]
  dockerfile = 'apps/dashboard/Dockerfile'

# Set API_URL so the dashboard can reach your API (e.g. Railway).
# Run: fly secrets set API_URL=https://telemetry-api.tacko.io
# If unset, the app falls back to http://localhost:3001 and will fail on Fly.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
