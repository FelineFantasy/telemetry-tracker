name: Release product email

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  milestone:
    types: [closed]
  workflow_dispatch:
    inputs:
      version:
        description: "Closing release tag (X.Y.Z) — last intended release of the minor line"
        required: true
      previous_version:
        description: "Last emailed / previous minor final (X.Y.Z); changelog starts after this"
        required: false
      line_close:
        description: "Send product email for the whole minor line (all X.Y.* since previous_version)"
        type: boolean
        default: true
      dry_run:
        description: "Preview only — print subject/recipients; do not send"
        type: boolean
        default: false

concurrency:
  # Serialize live/preview broadcasts so milestone close and workflow_dispatch cannot
  # race the same minor line and double-send before the ledger row is written.
  # Tag pushes never send; they keep a per-ref group so they do not block broadcasts.
  group: >-
    release-email-${{
      github.event_name == 'push' && github.ref || 'broadcast'
    }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Milestone close runs against main (release CHANGELOG + tags). Default branch is develop.
          ref: ${{ github.event_name == 'milestone' && 'main' || github.ref }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: tags
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          DISPATCH_PREVIOUS_VERSION: ${{ inputs.previous_version }}
          DISPATCH_LINE_CLOSE: ${{ inputs.line_close }}
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
          MILESTONE_TITLE: ${{ github.event_name == 'milestone' && github.event.milestone.title || '' }}
        run: |
          set -euo pipefail
          git fetch --tags --force origin

          SKIP=false
          SKIP_REASON=
          DRY_RUN=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CURRENT="$DISPATCH_VERSION"
            PREVIOUS="$DISPATCH_PREVIOUS_VERSION"
            # workflow_dispatch boolean inputs are the strings "true" / "false"
            if [ "$DISPATCH_LINE_CLOSE" = "true" ]; then
              LINE_CLOSE=true
            else
              LINE_CLOSE=false
            fi
            if [ "$DISPATCH_DRY_RUN" = "true" ]; then
              DRY_RUN=true
            fi
          elif [ "${{ github.event_name }}" = "milestone" ]; then
            TAGS=$(git tag -l "v*.*.*" --sort=version:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | tr '\n' ',' \
              | sed 's/,$//')
            RESOLVED=$(
              MILESTONE_TITLE="$MILESTONE_TITLE" RELEASE_TAGS="$TAGS" \
                pnpm exec tsx scripts/resolve-line-close-versions.ts
            )
            if [ "$(node -e "console.log(JSON.parse(process.argv[1]).skip === true)" "$RESOLVED")" = "true" ]; then
              SKIP=true
              SKIP_REASON=$(node -e "console.log(JSON.parse(process.argv[1]).reason || 'skipped')" "$RESOLVED")
              CURRENT=
              PREVIOUS=
              LINE_CLOSE=false
            else
              CURRENT=$(node -e "console.log(JSON.parse(process.argv[1]).version)" "$RESOLVED")
              PREVIOUS=$(node -e "const v=JSON.parse(process.argv[1]).previous_version; console.log(v == null ? '' : v)" "$RESOLVED")
              LINE_CLOSE=true
              echo "Milestone line-close resolve: $RESOLVED"
            fi
          else
            CURRENT="${GITHUB_REF_NAME#v}"
            if ! [[ "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid release tag: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
            PREVIOUS=$(git tag -l "v*.*.*" --merged HEAD --sort=-version:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -v "^${GITHUB_REF_NAME}$" \
              | head -1 \
              | sed 's/^v//')
            # Tag push never auto-sends; line-close sends on product milestone close (or manual dispatch)
            LINE_CLOSE=false
          fi

          if [ "$SKIP" != "true" ]; then
            if ! [[ "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid release version: ${CURRENT}" >&2
              exit 1
            fi
          fi

          {
            echo "skip=$SKIP"
            echo "skip_reason=$SKIP_REASON"
            echo "current=$CURRENT"
            echo "previous=$PREVIOUS"
            echo "line_close=$LINE_CLOSE"
            echo "dry_run=$DRY_RUN"
          } >> "$GITHUB_OUTPUT"
          if [ "$SKIP" = "true" ]; then
            echo "Skipping: ${SKIP_REASON}"
          else
            echo "Release ${CURRENT} (previous: ${PREVIOUS:-none}; line_close: ${LINE_CLOSE}; dry_run: ${DRY_RUN})"
          fi
        working-directory: apps/api

      - name: Skip non-product milestone
        if: steps.tags.outputs.skip == 'true'
        env:
          SKIP_REASON: ${{ steps.tags.outputs.skip_reason }}
        run: echo "Skipped product update email — ${SKIP_REASON}"

      - name: Ensure CHANGELOG at release version
        if: steps.tags.outputs.skip != 'true'
        env:
          RELEASE_CURRENT: ${{ steps.tags.outputs.current }}
        run: |
          if grep -qF "## [${RELEASE_CURRENT}]" CHANGELOG.md; then
            echo "CHANGELOG section present at checkout."
            exit 0
          fi
          echo "CHANGELOG missing ## [${RELEASE_CURRENT}] at checkout; fetching from origin/main"
          git fetch origin main
          if git show origin/main:CHANGELOG.md | grep -qF "## [${RELEASE_CURRENT}]"; then
            git show origin/main:CHANGELOG.md > CHANGELOG.md
            echo "Using CHANGELOG.md from origin/main for release email."
            exit 0
          fi
          echo "Could not find CHANGELOG section for ${RELEASE_CURRENT} on checkout or main" >&2
          exit 1

      - name: Check line-close / bump policy
        if: steps.tags.outputs.skip != 'true'
        id: bump
        working-directory: apps/api
        env:
          RELEASE_CURRENT: ${{ steps.tags.outputs.current }}
          RELEASE_PREVIOUS: ${{ steps.tags.outputs.previous }}
          RELEASE_LINE_CLOSE: ${{ steps.tags.outputs.line_close }}
        run: |
          ARGS=(--current="$RELEASE_CURRENT")
          if [ -n "$RELEASE_PREVIOUS" ]; then
            ARGS+=(--previous="$RELEASE_PREVIOUS")
          fi
          if [ "$RELEASE_LINE_CLOSE" = "true" ]; then
            ARGS+=(--line-close)
          fi
          BUMP=$(pnpm exec tsx scripts/check-release-email-bump.ts "${ARGS[@]}")
          echo "should_send=$(node -e "console.log(JSON.parse(process.argv[1]).send)" "$BUMP")" >> "$GITHUB_OUTPUT"
          echo "reason=$(node -e "console.log(JSON.parse(process.argv[1]).reason)" "$BUMP")" >> "$GITHUB_OUTPUT"
          echo "Bump decision: $BUMP"

      - name: Send product update email
        if: steps.tags.outputs.skip != 'true' && steps.bump.outputs.should_send == 'true'
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TELEMETRY_EMAIL_FROM: ${{ secrets.TELEMETRY_EMAIL_FROM }}
          TELEMETRY_DASHBOARD_ORIGIN: ${{ secrets.TELEMETRY_DASHBOARD_ORIGIN }}
          RELEASE_CURRENT: ${{ steps.tags.outputs.current }}
          RELEASE_PREVIOUS: ${{ steps.tags.outputs.previous }}
          RELEASE_LINE_CLOSE: ${{ steps.tags.outputs.line_close }}
          RELEASE_DRY_RUN: ${{ steps.tags.outputs.dry_run }}
        run: |
          ARGS=(--version="$RELEASE_CURRENT")
          if [ -n "$RELEASE_PREVIOUS" ]; then
            ARGS+=(--previous-version="$RELEASE_PREVIOUS")
          fi
          if [ "$RELEASE_LINE_CLOSE" = "true" ]; then
            ARGS+=(--line-close)
          fi
          if [ "$RELEASE_DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          pnpm exec tsx scripts/send-release-email.ts "${ARGS[@]}"

      - name: Skip under product-email policy
        if: steps.tags.outputs.skip != 'true' && steps.bump.outputs.should_send != 'true'
        env:
          SKIP_REASON: ${{ steps.bump.outputs.reason }}
        run: echo "Skipped product update email — ${SKIP_REASON}"
