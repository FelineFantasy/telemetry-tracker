name: Release product email

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: release-email-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Resolve semver tags
        id: tags
        run: |
          CURRENT="${GITHUB_REF_NAME#v}"
          if ! [[ "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          PREVIOUS=$(git tag -l "v*.*.*" --merged HEAD --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${GITHUB_REF_NAME}$" \
            | head -1 \
            | sed 's/^v//')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"
          echo "Tag ${GITHUB_REF_NAME} (previous on this line: ${PREVIOUS:-none})"

      - name: Check minor/major bump
        id: bump
        working-directory: apps/api
        env:
          RELEASE_CURRENT: ${{ steps.tags.outputs.current }}
          RELEASE_PREVIOUS: ${{ steps.tags.outputs.previous }}
        run: |
          ARGS=(--current="$RELEASE_CURRENT")
          if [ -n "$RELEASE_PREVIOUS" ]; then
            ARGS+=(--previous="$RELEASE_PREVIOUS")
          fi
          BUMP=$(pnpm exec tsx scripts/check-release-email-bump.ts "${ARGS[@]}")
          echo "should_send=$(node -e "console.log(JSON.parse(process.argv[1]).send)" "$BUMP")" >> "$GITHUB_OUTPUT"
          echo "reason=$(node -e "console.log(JSON.parse(process.argv[1]).reason)" "$BUMP")" >> "$GITHUB_OUTPUT"
          echo "Bump decision: $BUMP"

      - name: Check prior successful send
        id: send-cache
        if: steps.bump.outputs.should_send == 'true'
        uses: actions/cache@v4
        with:
          path: .release-email-sent
          key: release-email-sent-${{ github.ref_name }}

      - name: Send product update email
        if: steps.bump.outputs.should_send == 'true' && steps.send-cache.outputs.cache-hit != 'true'
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TELEMETRY_EMAIL_FROM: ${{ secrets.TELEMETRY_EMAIL_FROM }}
          TELEMETRY_DASHBOARD_ORIGIN: ${{ secrets.TELEMETRY_DASHBOARD_ORIGIN }}
          RELEASE_CURRENT: ${{ steps.tags.outputs.current }}
          RELEASE_PREVIOUS: ${{ steps.tags.outputs.previous }}
        run: |
          ARGS=(--version="$RELEASE_CURRENT")
          if [ -n "$RELEASE_PREVIOUS" ]; then
            ARGS+=(--previous-version="$RELEASE_PREVIOUS")
          fi
          pnpm exec tsx scripts/send-release-email.ts "${ARGS[@]}"

      - name: Record successful send
        if: success() && steps.bump.outputs.should_send == 'true' && steps.send-cache.outputs.cache-hit != 'true'
        run: mkdir -p .release-email-sent && date -u +%Y-%m-%dT%H:%M:%SZ > .release-email-sent/sent-at

      - name: Skip duplicate send
        if: steps.bump.outputs.should_send == 'true' && steps.send-cache.outputs.cache-hit == 'true'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: echo "Skipped product update email — already sent for ${RELEASE_TAG} (Actions cache)"

      - name: Skip patch-only release
        if: steps.bump.outputs.should_send != 'true'
        env:
          SKIP_REASON: ${{ steps.bump.outputs.reason }}
        run: echo "Skipped product update email — ${SKIP_REASON}"
