# Require @unjica approval on PRs to develop/main when the author is not @unjica.
# GitHub branch protection cannot express this natively (authors cannot approve
# their own PRs), so this job is a required status check instead of review count.
# Set required human approvals to 0 on protected branches; use this check instead.
name: Maintainer review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop]
  pull_request_review:
    types: [submitted, dismissed]
    branches: [main, develop]

permissions:
  pull-requests: read

concurrency:
  group: maintainer-review-${{ github.event.pull_request.number || github.event.review.pull_request_url }}
  cancel-in-progress: true

jobs:
  maintainer-review:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - name: Gate merge on maintainer approval for non-author PRs
        uses: actions/github-script@v7
        env:
          MAINTAINER: unjica
        with:
          # GitHub occasionally returns HTML 5xx ("Unicorn") instead of JSON; retry those.
          retries: 5
          script: |
            const maintainer = process.env.MAINTAINER.toLowerCase();
            const { owner, repo } = context.repo;

            let pull_number;
            if (context.payload.pull_request) {
              pull_number = context.payload.pull_request.number;
            } else {
              pull_number = Number(context.payload.review.pull_request_url.split("/").pop());
            }

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });

            if (pr.draft) {
              core.info("Draft PR — skipping gate.");
              return;
            }

            const author = pr.user.login.toLowerCase();
            if (author === maintainer) {
              core.info(`Author @${pr.user.login} is maintainer — approval not required.`);
              return;
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number,
            });

            const latestByUser = new Map();
            for (const review of reviews) {
              if (review.user?.login) {
                latestByUser.set(review.user.login.toLowerCase(), review.state);
              }
            }

            if (latestByUser.get(maintainer) === "APPROVED") {
              core.info(`Maintainer @${process.env.MAINTAINER} approved.`);
              return;
            }

            core.setFailed(
              `Author @${pr.user.login} is not @${process.env.MAINTAINER}. ` +
                `Merge requires an APPROVED review from @${process.env.MAINTAINER}.`
            );
