name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Prisma migrate deploy
        run: pnpm --filter api exec prisma migrate deploy

      - name: Test
        env:
          RUN_DB_INTEGRATION_TESTS: "true"
        run: pnpm test

      - name: Build
        run: pnpm -r run build

      - name: Verify committed telemetry-core dist matches build
        run: |
          git add -A packages/telemetry-core/dist packages/telemetry-next/dist
          git diff --cached --exit-code -- packages/telemetry-core/dist packages/telemetry-next/dist
          git diff --exit-code -- packages/telemetry-core/dist packages/telemetry-next/dist
