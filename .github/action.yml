name: 'Upload Source Maps'
description: 'Uploads source maps to Telemetry-Tracker on release'
inputs:
  api_key:
    description: 'Telemetry-Tracker API Key'
    required: true
  release:
    description: 'Release version/tag'
    required: true
  app:
    description: 'Application name'
    required: true
  artifact_path:
    description: 'Path to source map files'
    required: false
    default: './dist'

runs:
  using: 'composite'
  steps:
    - name: Upload maps via API
      shell: bash
      run: |
        for file in ${{ inputs.artifact_path }}/*.map; do
          if [ -f "$file" ]; then
            curl -X POST https://telemetry-tracker.com/api/project/source-maps \
              -H "X-API-Key: ${{ inputs.api_key }}" \
              -F "release=${{ inputs.release }}" \
              -F "app=${{ inputs.app }}" \
              -F "file=@$file"
          fi
        done
